    deploy-react:
      runs-on: ubuntu-latest
      # needs: react-ci
      if: github.event.inputs.environment != 'dev'
      environment: ${{github.event.inputs.environment}}
      steps:
        - name: code checkout
          uses: actions/checkout@v4  
        - name: ssh connect
          uses: appleboy/ssh-action@v1.2.0
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker login ghcr.io \
                -u ${{ github.actor }} \
                -p ${{ secrets.GITHUB_TOKEN }}

              docker pull ghcr.io/${{ github.repository_owner }}/react-app:51188e28e0c66ce3cb62e7b5fd785ac20488e182

              docker stop react-app || true
              docker rm react-app || true

              docker run -d \
                --name react-app \
                -p 80:80 \
                --network app-network \
                ghcr.io/${{ github.repository_owner }}/react-app:51188e28e0c66ce3cb62e7b5fd785ac20488e182
    deploy-dotnet:
      runs-on: ubuntu-latest
      # needs: dotnet-ci
      if: github.event.inputs.environment != 'dev'
      environment: ${{github.event.inputs.environment}}
      steps:
        - name: code checkout
          uses: actions/checkout@v4 
        - name: ssh connect
          uses: appleboy/ssh-action@v1.2.0  
          with:
            host: ${{secrets.EC2_HOSt}}
            username: ${{secrets.EC2_USER}}
            key: ${{secrets.EC2_SSH_KEY}}
            envs: |
              DB_HOST=${{ vars.DB_HOST }}
              DB_PORT=${{ vars.DB_PORT }}
              DB_NAME=${{ vars.DB_NAME }}
              DB_USER=${{ vars.DB_USER }}
              MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
              GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
              GH_ACTOR=${{ github.actor }}
              GH_OWNER=${{ github.repository_owner }}
            script: |
              docker login ghcr.io \
                -u ${{ github.actor }} \
                -p ${{ secrets.GITHUB_TOKEN }}

              docker pull ghcr.io/${{ github.repository_owner }}/dotnet:latest

              docker stop dotnet || true
              docker rm dotnet || true

              docker run -d --name dotnet --network app-network -p 5033:8080 -e DB_HOST="$DB_HOST" -e DB_PORT="$DB_PORT" -e DB_NAME="$DB_NAME" -e DB_USER="$DB_USER" -e DB_PASSWORD="$MYSQL_ROOT_PASSWORD" -e ASPNETCORE_URLS="http://+:8080" ghcr.io/$GH_OWNER/dotnet:latest
              # docker run -d \
              #   --name dotnet \
              #   --network app-network \
              #   -p 5000:8080 \
              #   -e DB_HOST=${{vars.DB_HOST}} \
              #   -e DB_PORT=${{vars.DB_PORT}} \
              #   -e DB_NAME=${{ vars.DB_NAME }} \
              #   -e DB_USER=${{ vars.DB_USER }} \
              #   -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
              #   ghcr.io/${{ github.repository_owner }}/dotnet:latest
    deploy-dev:
      runs-on: [self-hosted, linux]
      # needs: 
      #   # - react-ci
      #   # - dotnet-ci
      if: github.event.inputs.environment == 'dev'
      environment: dev
      steps:
        - name: code checkout
          uses: actions/checkout@v4 
        - name: run playbook    
          env:
            DB_HOST: ${{vars.DB_HOST}}
            DB_PORT: ${{vars.DB_PORT}}
            DB_NAME: ${{vars.DB_NAME}}
            DB_USER: ${{vars.DB_USER}}
            APP_URL: ${{vars.APP_URL}}
            MYSQL_ROOT_PASSWORD: ${{secrets.MYSQL_ROOT_PASSWORD}}
            username: ${{github.actor}}
            password: ${{secrets.GITHUB_TOKEN}}
          run: ansible-playbook playbook.yml

