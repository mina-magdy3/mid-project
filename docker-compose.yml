services: 
    frontend:
      image: ghcr.io/mina-magdy3/react-app:51188e28e0c66ce3cb62e7b5fd785ac20488e182
      networks: 
        - front_back
      ports:
       - 8080:80
      depends_on:
        - backend

    backend: 
      image: ghcr.io/mina-magdy3/dotnet:latest
      networks:
        - front_back
        - db_back
      secrets:
        - db_password
      environment:
        - DB_HOST=${DB_HOST}
        - DB_PORT=${DB_PORT}
        - DB_NAME=${DB_NAME}
        - DB_USER=${DB_USER}
        - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
        - DB_PASSWORD_FILE=/run/secrets/db_password
        - ASPNETCORE_URLS=http://+:8080
      depends_on:
        - db
      ports:
      - "5033:5033"

    db:
      image: mysql:8.0
      volumes:
        - db-data:/var/lib/mysql
      networks:
        - db_back
      secrets:
        - db_password
      environment:
       - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
       - MYSQL_DATABASE=${DB_NAME}
       - MYSQL_USER=${DB_USER}
       - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
       - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_password

volumes:
  db-data:
 
networks:
  front_back:
  db_back: 
 
secrets:
  db_password:
    file: ./db_password.txt
